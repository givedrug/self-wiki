<svg xmlns="http://www.w3.org/2000/svg" width="920" height="390" viewBox="0 0 920 390">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #dbe3ee; stroke-width: 1; filter: url(#shadow); }
      .title { font: 700 24px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .sub { font: 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
      .axis { stroke: #475569; stroke-width: 2; marker-end: url(#arrow); }
      .tickline { stroke: #475569; stroke-width: 2; }
      .label { font: 700 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .tick { font: 14px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .note { font: 700 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect width="920" height="390" class="bg"/>
  <rect x="36" y="30" width="848" height="320" rx="8" class="panel"/>
  <text x="64" y="72" class="title">第（2）问：两类 D(a) 的数轴形状</text>
  <text x="64" y="101" class="sub">奇函数给出两种典型情形；证明包含关系时，本质上是在比较端点。</text>

  <text x="82" y="162" class="label">a&lt;0</text>
  <line x1="210" y1="158" x2="800" y2="158" class="axis"/>
  <line x1="350" y1="148" x2="350" y2="168" class="tickline"/>
  <line x1="650" y1="148" x2="650" y2="168" class="tickline"/>
  <line x1="350" y1="158" x2="650" y2="158" stroke="#2563eb" stroke-width="9" stroke-linecap="round"/>
  <circle cx="350" cy="158" r="8" fill="#fff" stroke="#2563eb" stroke-width="3"/>
  <circle cx="650" cy="158" r="8" fill="#fff" stroke="#2563eb" stroke-width="3"/>
  <text x="346" y="192" class="tick">0</text>
  <text x="638" y="192" class="tick">-a</text>
  <text x="430" y="139" class="note" fill="#2563eb">D(a)=(0,-a)</text>

  <text x="82" y="276" class="label">a&gt;0</text>
  <line x1="210" y1="272" x2="800" y2="272" class="axis"/>
  <line x1="350" y1="262" x2="350" y2="282" class="tickline"/>
  <line x1="540" y1="262" x2="540" y2="282" class="tickline"/>
  <line x1="220" y1="272" x2="350" y2="272" stroke="#0f766e" stroke-width="9" stroke-linecap="round"/>
  <circle cx="350" cy="272" r="8" fill="#0f766e"/>
  <line x1="540" y1="272" x2="790" y2="272" stroke="#0f766e" stroke-width="9" stroke-linecap="round"/>
  <circle cx="540" cy="272" r="8" fill="#fff" stroke="#0f766e" stroke-width="3"/>
  <text x="337" y="306" class="tick">-a</text>
  <text x="536" y="306" class="tick">0</text>
  <text x="430" y="252" class="note" fill="#0f766e">D(a)=(-∞,-a] ∪ (0,+∞)</text>
</svg>
