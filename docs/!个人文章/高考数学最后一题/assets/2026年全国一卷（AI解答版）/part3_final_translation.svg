<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-15%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #dbe3ee; stroke-width: 1; filter: url(#shadow); }
      .chart { fill: #fbfdff; stroke: #e2e8f0; }
      .title { font: 700 24px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .sub { font: 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
      .axis { stroke: #334155; stroke-width: 2.1; marker-end: url(#arrow); }
      .grid { stroke: #e5eaf2; stroke-width: 1; }
      .aux { stroke: #94a3b8; stroke-width: 1.4; stroke-dasharray: 6 6; }
      .label { font: 700 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .small { font: 13px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
      .callout { fill: #ecfdf5; stroke: #bbf7d0; }
    </style>
  </defs>
  <rect width="960" height="500" class="bg"/>
  <rect x="38" y="28" width="884" height="436" rx="8" class="panel"/>
  <text x="68" y="70" class="title">第（3）问：用同一个增量 h 推出递增</text>
  <text x="68" y="99" class="sub">任取 0&lt;u&lt;v，令 h=v-u，并取 y=-h。图中两段弧形箭头都表示同一个 +h。</text>

  <g transform="translate(86,128)">
    <rect x="0" y="0" width="788" height="280" rx="8" class="chart"/>
    <line x1="56" y1="190" x2="736" y2="190" class="axis"/>
    <line x1="315" y1="248" x2="315" y2="34" class="axis"/>
    <line x1="56" y1="72" x2="736" y2="72" stroke="#f97316" stroke-width="2.1" stroke-dasharray="8 6"/>
    <text x="606" y="60" class="label" fill="#f97316">f(0)≥1</text>

    <line x1="178" y1="42" x2="178" y2="248" class="aux"/>
    <line x1="315" y1="42" x2="315" y2="248" class="aux"/>
    <line x1="520" y1="42" x2="520" y2="248" class="aux"/>
    <line x1="657" y1="42" x2="657" y2="248" class="aux"/>

    <path d="M62,156 C110,149 144,137 178,118 C226,92 270,66 315,48" fill="none" stroke="#2563eb" stroke-width="4.3" stroke-linecap="round"/>
    <path d="M520,222 C562,216 610,207 657,198" fill="none" stroke="#0f766e" stroke-width="4.3" stroke-linecap="round"/>
    <line x1="178" y1="118" x2="520" y2="222" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="6 6"/>

    <circle cx="178" cy="118" r="7" fill="#fff" stroke="#2563eb" stroke-width="3"/>
    <circle cx="315" cy="48" r="7" fill="#fff" stroke="#2563eb" stroke-width="3"/>
    <circle cx="520" cy="222" r="7" fill="#fff" stroke="#0f766e" stroke-width="3"/>
    <circle cx="657" cy="198" r="7" fill="#fff" stroke="#0f766e" stroke-width="3"/>

    <path d="M178,190 C208,160 285,160 315,190" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M520,190 C550,160 627,160 657,190" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="238" y="154" class="label" fill="#0f766e">+h</text>
    <text x="580" y="154" class="label" fill="#0f766e">+h</text>

    <text x="164" y="222" class="small">y=-h</text>
    <text x="311" y="222" class="small">0</text>
    <text x="516" y="222" class="small">u</text>
    <text x="653" y="222" class="small">v</text>
    <text x="110" y="111" class="small">f(y)=2^{-h}&gt;0</text>
    <text x="454" y="242" class="small">f(u)≤0</text>
  </g>

  <rect x="86" y="424" width="788" height="28" rx="8" class="callout"/>
  <text x="108" y="444" class="label" fill="#166534">f(u)≤f(y)，所以 D(y)⊆D(u)；又 h∈D(y)，于是 h∈D(u)，即 f(v)&gt;f(u)。</text>
</svg>
