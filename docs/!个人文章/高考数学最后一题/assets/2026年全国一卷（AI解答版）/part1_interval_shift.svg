<svg xmlns="http://www.w3.org/2000/svg" width="920" height="330" viewBox="0 0 920 330">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #dbe3ee; stroke-width: 1; filter: url(#shadow); }
      .title { font: 700 24px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .sub { font: 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
      .label { font: 700 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .tick { font: 14px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .axis { stroke: #475569; stroke-width: 2; marker-end: url(#arrow); }
      .tickline { stroke: #475569; stroke-width: 2; }
      .note { font: 700 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect width="920" height="330" class="bg"/>
  <rect x="36" y="30" width="848" height="270" rx="8" class="panel"/>
  <text x="64" y="72" class="title">第（1）问：区间平移</text>
  <text x="64" y="101" class="sub">令 t=-1+d，即 d=t+1。先解出 t 的范围，再整体向右平移 1。</text>

  <text x="88" y="154" class="label">t 轴</text>
  <line x1="210" y1="150" x2="800" y2="150" class="axis"/>
  <line x1="320" y1="140" x2="320" y2="160" class="tickline"/>
  <line x1="610" y1="140" x2="610" y2="160" class="tickline"/>
  <line x1="320" y1="150" x2="610" y2="150" stroke="#2563eb" stroke-width="9" stroke-linecap="round"/>
  <circle cx="320" cy="150" r="8" fill="#fff" stroke="#2563eb" stroke-width="3"/>
  <circle cx="610" cy="150" r="8" fill="#fff" stroke="#2563eb" stroke-width="3"/>
  <text x="313" y="184" class="tick">-1</text>
  <text x="596" y="184" class="tick">1/2</text>
  <text x="405" y="132" class="note" fill="#2563eb">t∈(-1, 1/2)</text>

  <path d="M465,190 C465,210 465,218 465,238" fill="none" stroke="#0f766e" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="486" y="218" class="label" fill="#0f766e">+1</text>

  <text x="88" y="264" class="label">d 轴</text>
  <line x1="210" y1="260" x2="800" y2="260" class="axis"/>
  <line x1="320" y1="250" x2="320" y2="270" class="tickline"/>
  <line x1="610" y1="250" x2="610" y2="270" class="tickline"/>
  <line x1="320" y1="260" x2="610" y2="260" stroke="#0f766e" stroke-width="9" stroke-linecap="round"/>
  <circle cx="320" cy="260" r="8" fill="#fff" stroke="#0f766e" stroke-width="3"/>
  <circle cx="610" cy="260" r="8" fill="#fff" stroke="#0f766e" stroke-width="3"/>
  <text x="316" y="294" class="tick">0</text>
  <text x="594" y="294" class="tick">3/2</text>
  <text x="396" y="242" class="note" fill="#0f766e">D(-1)=(0, 3/2)</text>
</svg>
