<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-15%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #dbe3ee; stroke-width: 1; filter: url(#shadow); }
      .title { font: 700 24px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .sub { font: 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; }
      .given { fill: #fff7ed; stroke: #fdba74; }
      .step { fill: #eff6ff; stroke: #93c5fd; }
      .final { fill: #ecfdf5; stroke: #86efac; }
      .head { font: 700 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .body { font: 14px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .tag { font: 13px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
    </style>
  </defs>
  <rect width="960" height="500" class="bg"/>
  <rect x="38" y="28" width="884" height="436" rx="8" class="panel"/>
  <text x="68" y="70" class="title">第（3）问：证明链条</text>
  <text x="68" y="99" class="sub">每一步都用反证法把“函数值大小”转成 D 集合包含，再制造矛盾。</text>

  <rect x="78" y="135" width="218" height="76" rx="8" class="box given"/>
  <text x="98" y="164" class="head">左侧已知</text>
  <text x="98" y="190" class="body">x&lt;0 时，f(x)=2^x</text>

  <rect x="334" y="135" width="238" height="76" rx="8" class="box given"/>
  <text x="354" y="164" class="head">条件①</text>
  <text x="354" y="190" class="body">f(x₁)≤f(x₂) ⇒ D(x₂)⊆D(x₁)</text>

  <rect x="610" y="135" width="218" height="76" rx="8" class="box given"/>
  <text x="630" y="164" class="head">条件②</text>
  <text x="630" y="190" class="body">0&lt;x&lt;1 时，f(x)&lt;f(0)</text>

  <rect x="78" y="270" width="170" height="66" rx="8" class="box step"/>
  <text x="100" y="297" class="head">结论 1</text>
  <text x="100" y="321" class="body">f(0)≥1</text>

  <rect x="288" y="270" width="198" height="66" rx="8" class="box step"/>
  <text x="310" y="297" class="head">结论 2</text>
  <text x="310" y="321" class="body">0&lt;x&lt;1 ⇒ f(x)≤0</text>

  <rect x="526" y="270" width="198" height="66" rx="8" class="box step"/>
  <text x="548" y="297" class="head">结论 3</text>
  <text x="548" y="321" class="body">x&gt;0 ⇒ f(x)&lt;f(0)</text>

  <rect x="288" y="385" width="198" height="66" rx="8" class="box step"/>
  <text x="310" y="412" class="head">结论 4</text>
  <text x="310" y="436" class="body">x&gt;0 ⇒ f(x)≤0</text>

  <rect x="526" y="385" width="198" height="66" rx="8" class="box final"/>
  <text x="548" y="412" class="head">最终</text>
  <text x="548" y="436" class="body">0&lt;u&lt;v ⇒ f(u)&lt;f(v)</text>

  <path d="M193,211 C193,236 178,242 168,270" fill="none" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M453,211 C426,236 400,246 387,270" fill="none" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M719,211 C690,236 648,246 625,270" fill="none" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M248,303 L288,303" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M486,303 L526,303" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M625,336 C596,365 528,385 486,418" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M486,418 L526,418" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)"/>

  <text x="258" y="291" class="tag">反证</text>
  <text x="496" y="291" class="tag">反证</text>
  <text x="515" y="377" class="tag">反证</text>
  <text x="498" y="407" class="tag">传递 D</text>
</svg>
